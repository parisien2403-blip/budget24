<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Budget24</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#101A33">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget24">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --navy:#101A33;
    --navy-2:#16223F;
    --ivory:#FBF7EF;
    --ivory-dim:#F0EAD9;
    --gold:#C9962E;
    --gold-light:#E3B753;
    --green:#3F7D5C;
    --rust:#B2533A;
    --grey:#8A8D98;
    --line:#E4DECF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--navy);
    font-family:'Inter',sans-serif;
    color:var(--navy);
    display:flex;
    justify-content:center;
    min-height:100vh;
    padding:28px 12px;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{outline:2px solid var(--gold-light);outline-offset:2px;}
  input{font-family:inherit;}
  .icon{width:18px;height:18px;display:inline-block;vertical-align:middle;}
  .icon svg{width:100%;height:100%;}

  .phone{
    width:100%;max-width:420px;background:var(--ivory);
    border-radius:32px;overflow:hidden;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.55), 0 0 0 8px #0b1326;
    min-height:840px;display:flex;flex-direction:column;position:relative;
  }
  @media (max-width:480px){
    body{padding:0;}
    .phone{border-radius:0;min-height:100vh;box-shadow:none;}
  }

  /* ---------- Header ---------- */
  .header{
    background:var(--navy);color:var(--ivory);
    padding:18px 16px 14px;display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .seal{
    width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transform:rotate(-8deg);position:relative;
  }
  .seal::after{
    content:"";position:absolute;inset:4px;border:1px solid var(--gold);border-radius:50%;opacity:.6;
  }
  .seal span{font-family:'Fraunces',serif;font-weight:700;font-size:13px;color:var(--gold-light);transform:rotate(8deg);}
  .wordmark{font-family:'Fraunces',serif;font-size:21px;font-weight:600;letter-spacing:.2px;}
  .wordmark em{font-style:normal;color:var(--gold-light);}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--ivory);
  }
  .icon-btn:hover{background:rgba(255,255,255,.08);}

  /* ---------- Year bar ---------- */
  .year-bar{
    background:var(--navy-2);color:var(--ivory);
    display:flex;align-items:center;justify-content:center;gap:14px;
    padding:8px 0;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
  }
  .year-bar button{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--gold-light);border-radius:50%;}
  .year-bar button:hover{background:rgba(255,255,255,.08);}
  .year-bar .year-num{font-family:'IBM Plex Mono',monospace;font-size:15px;letter-spacing:0;color:var(--ivory);}

  /* ---------- Month tabs ---------- */
  .month-tabs{
    display:flex;overflow-x:auto;background:var(--ivory);
    border-bottom:1px solid var(--line);
    scrollbar-width:none;
  }
  .month-tabs::-webkit-scrollbar{display:none;}
  .month-tab{
    flex:0 0 auto;min-width:74px;padding:10px 8px 9px;text-align:center;
    border-right:1px solid var(--line);border-bottom:3px solid transparent;
    display:flex;flex-direction:column;gap:3px;
  }
  .month-tab .m-name{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);font-weight:600;}
  .month-tab .m-amt{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:500;}
  .month-tab.active{background:var(--ivory-dim);border-bottom-color:var(--gold);}
  .month-tab.active .m-name{color:var(--navy);}
  .amt-pos{color:var(--green);}
  .amt-neg{color:var(--rust);}

  /* ---------- Action bar ---------- */
  .action-bar{display:flex;background:var(--navy-2);}
  .action-tab{
    flex:1;padding:11px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:#aab3c9;font-size:11px;font-weight:600;letter-spacing:.3px;
    border-bottom:2px solid transparent;
  }
  .action-tab.active{color:var(--gold-light);border-bottom-color:var(--gold);}
  .action-tab .icon{width:17px;height:17px;}

  /* ---------- Main ---------- */
  main{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}

  .balance-card{
    background:var(--navy);color:var(--ivory);border-radius:18px;padding:18px 18px 16px;margin-bottom:16px;
    position:relative;overflow:hidden;
  }
  .balance-card .label{
    font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#9aa6c2;
    display:flex;align-items:center;gap:7px;margin-bottom:6px;
  }
  .mini-seal{
    width:20px;height:20px;border-radius:50%;border:1.4px solid var(--gold);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;transform:rotate(-8deg);
  }
  .mini-seal span{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--gold-light);font-weight:600;transform:rotate(8deg);}
  .balance-card .amount{font-family:'Fraunces',serif;font-size:32px;font-weight:600;}
  .balance-card .sub{font-size:12px;color:#8b96b3;margin-top:6px;}
  .hint{font-size:12px;color:var(--grey);margin:-8px 0 16px;line-height:1.5;}

  /* calendar */
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
  .weekdays div{text-align:center;font-size:11px;color:var(--grey);font-weight:600;text-transform:uppercase;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-cell{
    aspect-ratio:1;border:1px solid var(--line);border-radius:10px;background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    position:relative;
  }
  .cal-cell.empty{border:none;background:transparent;}
  .cal-cell .d-num{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--navy);}
  .cal-cell.is-today{box-shadow:inset 0 0 0 1.6px var(--navy);}
  .cal-cell.is-24{box-shadow:inset 0 0 0 2px var(--gold);background:#FFFBF1;}
  .cal-dots{display:flex;gap:3px;height:6px;}
  .dot{width:5px;height:5px;border-radius:50%;}
  .dot.income{background:var(--green);}
  .dot.expense{background:var(--rust);}
  .dot.ring{background:transparent;border:1.3px solid var(--green);}
  .dot.ring.expense{border-color:var(--rust);}

  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .section-head h2{font-family:'Fraunces',serif;font-size:19px;margin:0;font-weight:600;}
  .section-head .total{font-family:'IBM Plex Mono',monospace;font-size:14px;}

  .add-btn{
    width:100%;background:var(--navy);color:var(--gold-light);border-radius:12px;
    padding:12px;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;
    margin-bottom:14px;
  }
  .add-btn:active{transform:scale(.98);}

  .tx-row{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);}
  .tx-row:last-child{border-bottom:none;}
  .tx-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .tx-icon.income{background:#E6F1EA;color:var(--green);}
  .tx-icon.expense{background:#F6E7E1;color:var(--rust);}
  .tx-mid{flex:1;min-width:0;}
  .tx-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-date{font-size:11.5px;color:var(--grey);font-family:'IBM Plex Mono',monospace;}
  .tx-amt{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;flex-shrink:0;}
  .icon-action{color:var(--grey);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icon-action:hover{color:var(--navy);}
  .icon-action.danger:hover{color:var(--rust);}
  .empty-state{text-align:center;color:var(--grey);font-size:13.5px;padding:30px 10px;line-height:1.6;}

  .rec-row{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--line);}
  .rec-row:last-child{border-bottom:none;}
  .rec-mid{flex:1;min-width:0;}
  .rec-libelle{font-size:14.5px;font-weight:600;}
  .rec-sub{font-size:11.5px;color:var(--grey);margin-top:3px;line-height:1.5;}
  .rec-sub b{font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--navy);}
  .rec-amt{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;flex-shrink:0;white-space:nowrap;}
  .rec-actions{display:flex;gap:2px;flex-shrink:0;}

  .pdf-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;}
  .pdf-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .pdf-row:last-child{border-bottom:none;font-weight:700;padding-top:12px;}
  .pdf-row .v{font-family:'IBM Plex Mono',monospace;}
  .pdf-btn{
    width:100%;background:var(--gold);color:var(--navy);border-radius:14px;padding:14px;
    font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .pdf-btn:active{transform:scale(.98);}
  .pdf-month-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;}
  .pdf-month-nav button{width:30px;height:30px;border-radius:50%;background:var(--navy);color:var(--gold-light);display:flex;align-items:center;justify-content:center;}
  .pdf-month-nav .lbl{font-family:'Fraunces',serif;font-size:16px;font-weight:600;min-width:140px;text-align:center;}

  /* ---------- Modal ---------- */
  .overlay{position:absolute;inset:0;background:rgba(16,26,51,.55);display:flex;align-items:flex-end;z-index:20;}
  .sheet{
    width:100%;background:var(--ivory);border-radius:22px 22px 0 0;padding:18px 18px 22px;
    max-height:86%;overflow-y:auto;
    animation:slideUp .18s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .sheet-head h3{font-family:'Fraunces',serif;font-size:18px;margin:0;font-weight:600;}
  .sheet-close{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--grey);background:#fff;}

  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600;margin-bottom:5px;}
  .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:15px;background:#fff;color:var(--navy);}
  .type-toggle{display:flex;gap:8px;margin-bottom:13px;}
  .type-pill, .noend-pill{
    border:1.4px solid var(--line);border-radius:10px;padding:10px;text-align:center;font-size:13.5px;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:6px;color:var(--grey);background:#fff;
  }
  .type-pill{flex:1;}
  .type-pill[data-type="expense"].active{border-color:var(--rust);color:var(--rust);background:#FBEEE9;}
  .type-pill[data-type="income"].active{border-color:var(--green);color:var(--green);background:#EAF4EE;}
  .noend-row{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
  .noend-pill{padding:9px 14px;}
  .noend-pill.active{border-color:var(--gold);color:var(--gold);background:#FBF3E2;}

  .save-btn{width:100%;background:var(--navy);color:var(--ivory);border-radius:12px;padding:13px;font-weight:600;font-size:14.5px;margin-top:4px;}
  .save-btn:active{transform:scale(.98);}
  .delete-link{width:100%;text-align:center;color:var(--rust);font-size:13px;font-weight:600;padding:14px 0 0;}
  .link-btn{width:100%;text-align:center;color:var(--grey);font-size:13px;font-weight:600;padding:10px 0 0;}
  .divider-label{font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600;margin:16px 0 8px;}
  .occ-note{font-size:12px;color:var(--grey);line-height:1.6;margin:-2px 0 14px;background:#F0EAD9;padding:10px 12px;border-radius:10px;}

  .toast{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:var(--ivory);padding:10px 18px;border-radius:30px;font-size:13px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:30;
  }
</style>
</head>
<body>
<div class="phone" id="phone">
  <div id="app"></div>
</div>

<script>
/* =================== ICONS =================== */
const ICONS = {
  gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"/></svg>',
  chevLeft: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
  chevRight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
  x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>',
  pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
  up: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>',
  down: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></svg>',
  download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  fileText: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>'
};
function icon(name, cls){return '<span class="icon '+(cls||'')+'">'+ICONS[name]+'</span>';}

/* =================== CONSTANTS =================== */
const MONTHS_FULL=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MONTHS_ABBR=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const WEEKDAYS=['Lu','Ma','Me','Je','Ve','Sa','Di'];

/* =================== STATE =================== */
let settings = { soldeInitial:0, dateReference: todayISO() };
let recurring = [];     // {id,type,libelle,montant,jour,dateDebut,dateFin|null}
let overrides = [];     // {id,recurringId,monthKey,montant|null,date|null,deleted|false}
let transactions = [];  // inopiné: {id,date,type,montant,description}
let selectedYear = new Date().getFullYear();
let selectedMonth = null;
let activeView = null;  // null | calendar | expenses | incomes | pdf
let pdfYear = new Date().getFullYear();
let pdfMonth = new Date().getMonth();
let modal = null;
let loaded = false;
let toastMsg = null;
let modalTypeState = 'expense';
let modalNoEnd = true;

function todayISO(){ const d=new Date(); return fmtISO(d.getFullYear(),d.getMonth(),d.getDate()); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtISO(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
function uid(){ return 'id-'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function fmtMoney(v, decimals){
  if(v===null||v===undefined||isNaN(v)) v=0;
  return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:decimals?2:0,maximumFractionDigits:decimals?2:0}).format(v);
}
function clampDay(y,m,day){ const last=new Date(y,m+1,0).getDate(); return Math.min(day,last); }
function monthKeyOf(y,m){ return y+'-'+pad(m+1); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function formatDateFr(iso){ const [y,m,d]=iso.split('-'); return d+' '+MONTHS_ABBR[parseInt(m,10)-1]; }
function formatDateFull(iso){ const [y,m,d]=iso.split('-').map(Number); return d+' '+MONTHS_FULL[m-1]+' '+y; }

/* =================== STORAGE =================== */
async function loadData(){
  try{
    const raw = localStorage.getItem('budget24-data');
    if(raw){
      const parsed = JSON.parse(raw);
      settings = Object.assign(settings, parsed.settings||{});
      recurring = parsed.recurring || [];
      overrides = parsed.overrides || [];
      transactions = parsed.transactions || [];
    } else {
      modal = {kind:'settings', first:true};
    }
  }catch(e){
    modal = {kind:'settings', first:true};
  }
  migrateOldSalary();
  loaded = true;
  render();
}
function migrateOldSalary(){
  if(settings.salaire && Number(settings.salaire)>0){
    recurring.push({id:uid(), type:'income', libelle:'Salaire', montant:Number(settings.salaire), jour:Number(settings.jourSalaire)||25, dateDebut:settings.dateReference, dateFin:null});
    delete settings.salaire; delete settings.jourSalaire;
    persist();
  }
}
async function persist(){
  try{
    localStorage.setItem('budget24-data', JSON.stringify({settings, recurring, overrides, transactions}));
  }catch(e){
    showToast('Erreur de sauvegarde, réessayez.');
  }
}
function showToast(msg){
  toastMsg = msg;
  render();
  setTimeout(()=>{ toastMsg=null; render(); }, 2200);
}

/* =================== RECURRING / BALANCE LOGIC =================== */
function getOverrideFor(recurringId, monthKey){
  return overrides.find(o=>o.recurringId===recurringId && o.monthKey===monthKey) || null;
}
function getRecurringOccurrences(maxYear){
  const out = [];
  recurring.forEach(r=>{
    const start = new Date(r.dateDebut+'T00:00:00');
    const end = r.dateFin ? new Date(r.dateFin+'T00:00:00') : null;
    let y = start.getFullYear(), m = start.getMonth();
    const limit = new Date(maxYear+1,0,1);
    let guard=0;
    while(true){
      guard++; if(guard>3000) break;
      const day = clampDay(y,m,r.jour);
      const occDate = new Date(y,m,day);
      if(occDate >= limit) break;
      if(occDate >= start && (!end || occDate <= end)){
        const monthKey = monthKeyOf(y,m);
        const ov = getOverrideFor(r.id, monthKey);
        if(!(ov && ov.deleted)){
          out.push({
            date: ov && ov.date ? ov.date : fmtISO(y,m,day),
            amount: ov && ov.montant!=null ? Number(ov.montant) : Number(r.montant),
            type: r.type,
            recurringId: r.id,
            libelle: r.libelle,
            monthKey,
            overridden: !!ov
          });
        }
      }
      m++; if(m>11){m=0;y++;}
    }
  });
  return out;
}
function getAllEvents(maxYear){
  const txEvents = transactions.map(t=>({date:t.date, amount: t.type==='income'? Number(t.montant) : -Number(t.montant)}));
  const recEvents = getRecurringOccurrences(maxYear).map(o=>({date:o.date, amount: o.type==='income'? o.amount : -o.amount}));
  return txEvents.concat(recEvents);
}
function computeBalanceAt(uptoISO){
  const upToDate = new Date(uptoISO+'T00:00:00');
  const refDate = new Date(settings.dateReference+'T00:00:00');
  const maxYear = Math.max(upToDate.getFullYear(), refDate.getFullYear());
  const events = getAllEvents(maxYear);
  let sum=0;
  if(upToDate >= refDate){
    events.forEach(e=>{ const ed=new Date(e.date+'T00:00:00'); if(ed>refDate && ed<=upToDate) sum+=e.amount; });
    return Number(settings.soldeInitial) + sum;
  } else {
    events.forEach(e=>{ const ed=new Date(e.date+'T00:00:00'); if(ed>upToDate && ed<=refDate) sum+=e.amount; });
    return Number(settings.soldeInitial) - sum;
  }
}
function balanceAu24(year,month){ return computeBalanceAt(fmtISO(year,month,24)); }

function txForDay(iso){ return transactions.filter(t=>t.date===iso); }
function recurringOccurrencesForDay(iso){
  const y = parseInt(iso.slice(0,4),10);
  return getRecurringOccurrences(y).filter(o=>o.date===iso);
}
function recurringOccurrencesForMonth(year,month){
  const prefix = monthKeyOf(year,month);
  return getRecurringOccurrences(year).filter(o=>o.monthKey===prefix);
}
function txForMonth(year,month,type){
  const prefix = monthKeyOf(year,month);
  return transactions.filter(t=>t.date.startsWith(prefix) && (!type || t.type===type)).sort((a,b)=>a.date.localeCompare(b.date));
}
function recurringByType(type){
  return recurring.filter(r=>r.type===type).slice().sort((a,b)=>a.libelle.localeCompare(b.libelle));
}

/* =================== RENDER =================== */
function render(){
  const app = document.getElementById('app');
  if(!loaded){ app.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#8A8D98;font-family:Inter,sans-serif;">Chargement…</div>'; return; }

  app.innerHTML = `
    ${renderHeader()}
    ${renderYearBar()}
    ${renderMonthTabs()}
    ${renderActionBar()}
    <main>${renderMain()}</main>
    ${modal ? renderModal() : ''}
    ${toastMsg ? '<div class="toast">'+toastMsg+'</div>' : ''}
  `;
  applyModalUIState();
}
function applyModalUIState(){
  if(!modal) return;
  if(modal.kind==='day' && (modal.formOpen || modal.editingTxId)){
    document.querySelectorAll('.type-pill').forEach(p=>p.classList.toggle('active', p.dataset.type===modalTypeState));
  }
  if(modal.kind==='recurring'){
    const pill = document.getElementById('noend-pill');
    const wrap = document.getElementById('fin-field');
    if(pill) pill.classList.toggle('active', modalNoEnd);
    if(wrap) wrap.style.display = modalNoEnd ? 'none' : 'block';
  }
}

function renderHeader(){

function renderMonthTabs(){

function renderMain(){

  </div>`;
}

function renderCalendar(){
  const bal = balanceAu24(selectedYear,selectedMonth);
  const todayIso = todayISO();
  const firstDow = (new Date(selectedYear,selectedMonth,1).getDay()+6)%7;
  const daysInMonth = new Date(selectedYear,selectedMonth+1,0).getDate();

  let html = `
  <div class="balance-card">
    <div class="label"><span class="mini-seal"><span>24</span></span> Solde au 24 ${MONTHS_FULL[selectedMonth]}</div>
    <div class="amount" style="color:${bal>=0?'#fff':'#E08566'}">${fmtMoney(bal,true)}</div>
    <div class="sub">Ce qu'il vous restera avant le prochain versement</div>
  </div>`;
  if(recurring.filter(r=>r.type==='income').length===0){
    html += `<div class="hint">💡 Astuce : ajoutez votre salaire dans l'onglet Revenus (en bas) pour un calcul automatique du solde.</div>`;
  }

  html += '<div class="weekdays">'+WEEKDAYS.map(w=>'<div>'+w+'</div>').join('')+'</div>';
  html += '<div class="cal-grid">';
  for(let i=0;i<firstDow;i++) html += '<div class="cal-cell empty"></div>';
  for(let d=1; d<=daysInMonth; d++){
    const iso = fmtISO(selectedYear,selectedMonth,d);
    const dayTx = txForDay(iso);
    const dayRec = recurringOccurrencesForDay(iso);
    const hasIncomeOne = dayTx.some(t=>t.type==='income');
    const hasExpenseOne = dayTx.some(t=>t.type==='expense');
    const hasIncomeRec = dayRec.some(o=>o.type==='income');
    const hasExpenseRec = dayRec.some(o=>o.type==='expense');
    let classes = 'cal-cell';
    if(iso===todayIso) classes += ' is-today';
    if(d===24) classes += ' is-24';
    let dots = '';
    if(hasIncomeOne) dots += '<span class="dot income"></span>';
    else if(hasIncomeRec) dots += '<span class="dot ring"></span>';
    if(hasExpenseOne) dots += '<span class="dot expense"></span>';
    else if(hasExpenseRec) dots += '<span class="dot ring expense"></span>';
    html += `<button class="${classes}" data-action="open-day" data-date="${iso}">
      <span class="d-num">${d}</span>
      <span class="cal-dots">${dots}</span>
    </button>`;
  }
  html += '</div>';
  return html;
}

}

/* =================== EVENTS =================== */
document.addEventListener('click', async (e)=>{
  if(e.target.classList && e.target.classList.contains('overlay')){ modal=null; render(); return; }
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;

  if(action==='select-month'){ selectedMonth = parseInt(btn.dataset.month,10); activeView='calendar'; render(); return; }
  if(action==='select-view'){
    activeView = btn.dataset.view;
    if(activeView==='pdf' && selectedMonth!=null){ pdfYear=selectedYear; pdfMonth=selectedMonth; }
    render(); return;
  }
  if(action==='year-prev'){ selectedYear--; render(); return; }
  if(action==='year-next'){ selectedYear++; render(); return; }
  if(action==='pdf-prev'){ pdfMonth--; if(pdfMonth<0){pdfMonth=11;pdfYear--;} render(); return; }
  if(action==='pdf-next'){ pdfMonth++; if(pdfMonth>11){pdfMonth=0;pdfYear++;} render(); return; }

  if(action==='open-settings'){ modal={kind:'settings'}; render(); return; }
  if(action==='close-modal'){ modal=null; render(); return; }

  /* ---- day modal ---- */
  if(action==='open-day'){ modal = {kind:'day', date:btn.dataset.date, formOpen:false, editingTxId:null}; modalTypeState='expense'; render(); return; }
  if(action==='show-day-form'){ modal.formOpen=true; modal.editingTxId=null; modalTypeState='expense'; render(); return; }
  if(action==='cancel-day-form'){ modal.formOpen=false; modal.editingTxId=null; render(); return; }
  if(action==='edit-day-tx'){
    const t = transactions.find(x=>x.id===btn.dataset.id);
    if(!t) return;
    modal.editingTxId = t.id; modal.formOpen=false; modalTypeState=t.type; render(); return;
  }
  if(action==='toggle-type'){
    modalTypeState = btn.dataset.type;
    document.querySelectorAll('.type-pill').forEach(p=>p.classList.toggle('active', p.dataset.type===modalTypeState));
    return;
  }
  if(action==='save-day-tx'){
    const montant = parseFloat(document.getElementById('tx-amount').value);
    if(!montant || montant<=0){ showToast('Indiquez un montant valide.'); return; }
    const date = document.getElementById('tx-date').value || modal.date;
    const description = document.getElementById('tx-desc').value.trim();
    if(modal.editingTxId){
      const t = transactions.find(x=>x.id===modal.editingTxId);
      t.montant=montant; t.description=description; t.date=date; t.type=modalTypeState;
    } else {
      transactions.push({id:uid(), date, type:modalTypeState, montant, description});
    }
    await persist();
    modal.formOpen=false; modal.editingTxId=null;
    render();
    showToast('Enregistré.');
    return;
  }
  if(action==='delete-tx'){
    transactions = transactions.filter(t=>t.id!==btn.dataset.id);
    await persist();
    if(modal && modal.kind==='day'){ modal.formOpen=false; modal.editingTxId=null; } else { modal=null; }
    render();
    showToast('Supprimé.');
    return;
  }

  /* ---- recurring CRUD ---- */
  if(action==='add-recurring'){ modal={kind:'recurring', type:btn.dataset.type}; modalNoEnd=true; render(); return; }
  if(action==='edit-recurring'){
    const r = recurring.find(x=>x.id===btn.dataset.id);
    if(!r) return;
    modal = {kind:'recurring', type:r.type, editId:r.id}; modalNoEnd = !r.dateFin; render(); return;
  }
  if(action==='toggle-noend'){
    modalNoEnd = !modalNoEnd;
    const pill = document.getElementById('noend-pill');
    const wrap = document.getElementById('fin-field');
    if(pill) pill.classList.toggle('active', modalNoEnd);
    if(wrap) wrap.style.display = modalNoEnd ? 'none' : 'block';
    return;
  }
  if(action==='save-recurring'){
    const libelle = document.getElementById('rec-libelle').value.trim();
    const montant = parseFloat(document.getElementById('rec-montant').value);
    const jour = Math.min(31, Math.max(1, parseInt(document.getElementById('rec-jour').value,10)||1));
    const dateDebut = document.getElementById('rec-debut').value || todayISO();
    const dateFinVal = document.getElementById('rec-fin').value;
    const dateFin = modalNoEnd ? null : (dateFinVal || null);
    if(!libelle){ showToast('Indiquez un libellé.'); return; }
    if(!montant || montant<=0){ showToast('Indiquez un montant valide.'); return; }
    if(dateFin && dateFin<dateDebut){ showToast('La date de fin doit être après le début.'); return; }
    if(modal.editId){
      const r = recurring.find(x=>x.id===modal.editId);
      Object.assign(r, {libelle, montant, jour, dateDebut, dateFin});
    } else {
      recurring.push({id:uid(), type:modal.type, libelle, montant, jour, dateDebut, dateFin});
    }
    await persist();
    modal=null; render();
    showToast('Enregistré.');
    return;
  }
  if(action==='delete-recurring'){
    const id = btn.dataset.id;
    recurring = recurring.filter(r=>r.id!==id);
    overrides = overrides.filter(o=>o.recurringId!==id);
    await persist();
    modal=null; render();
    showToast('Supprimé.');
    return;
  }

  /* ---- single-occurrence adjustments ---- */
  if(action==='adjust-occurrence'){
    const dayDate = modal.date;
    modal = {kind:'occurrence', recurringId:btn.dataset.recurringId, monthKey:btn.dataset.monthKey, dayDate};
    render(); return;
  }
  if(action==='back-to-day'){ modal = {kind:'day', date:modal.dayDate, formOpen:false, editingTxId:null}; render(); return; }
  if(action==='save-occurrence'){
    const montant = parseFloat(document.getElementById('occ-amount').value);
    const date = document.getElementById('occ-date').value;
    if(!montant || montant<=0){ showToast('Indiquez un montant valide.'); return; }
    let ov = getOverrideFor(modal.recurringId, modal.monthKey);
    if(!ov){ ov = {id:uid(), recurringId:modal.recurringId, monthKey:modal.monthKey}; overrides.push(ov); }
    ov.montant = montant; ov.date = date; ov.deleted=false;
    await persist();
    const dayDate = modal.dayDate;
    modal = {kind:'day', date:dayDate, formOpen:false, editingTxId:null};
    render();
    showToast('Échéance ajustée pour ce mois.');
    return;
  }
  if(action==='reset-occurrence'){
    overrides = overrides.filter(o=>!(o.recurringId===modal.recurringId && o.monthKey===modal.monthKey));
    await persist();
    const dayDate = modal.dayDate;
    modal = {kind:'day', date:dayDate, formOpen:false, editingTxId:null};
    render();
    showToast('Échéance réinitialisée.');
    return;
  }
  if(action==='skip-occurrence'){
    let ov = getOverrideFor(modal.recurringId, modal.monthKey);
    if(!ov){ ov = {id:uid(), recurringId:modal.recurringId, monthKey:modal.monthKey}; overrides.push(ov); }
    ov.deleted = true;
    await persist();
    const dayDate = modal.dayDate;
    modal = {kind:'day', date:dayDate, formOpen:false, editingTxId:null};
    render();
    showToast('Échéance ignorée pour ce mois.');
    return;
  }

  if(action==='save-settings'){
    const solde = parseFloat(document.getElementById('set-solde').value)||0;
    const date = document.getElementById('set-date').value || todayISO();
    settings = {soldeInitial:solde, dateReference:date};
    await persist();
    modal=null; render();
    showToast('Réglages enregistrés.');
    return;
  }

  if(action==='generate-pdf'){ generatePdf(pdfYear, pdfMonth); return; }
});

/* =================== PDF GENERATION =================== */
function generatePdf(year, month){
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const monthName = MONTHS_FULL[month];
    let y = 20;

    doc.setFont('helvetica','bold'); doc.setFontSize(18);
    doc.text('Relevé de budget — Budget24', 14, y); y+=8;
    doc.setFont('helvetica','normal'); doc.setFontSize(12);
    doc.text(monthName+' '+year, 14, y); y+=10;
    doc.setDrawColor(200); doc.line(14,y,196,y); y+=8;

    const ones = txForMonth(year,month).map(t=>({date:t.date, desc:t.description||(t.type==='income'?'Revenu':'Dépense'), type:t.type, montant:t.montant, nature:'Ponctuel'}));
    const recs = recurringOccurrencesForMonth(year,month).map(o=>({date:o.date, desc:o.libelle, type:o.type, montant:o.amount, nature:'Récurrent'}));
    const all = ones.concat(recs).sort((a,b)=>a.date.localeCompare(b.date));

    doc.setFont('helvetica','bold'); doc.setFontSize(10.5);
    doc.text('Date',14,y); doc.text('Libellé',38,y); doc.text('Nature',120,y); doc.text('Type',150,y); doc.text('Montant',196,y,{align:'right'});
    y+=6; doc.setFont('helvetica','normal');

    if(all.length===0){
      doc.text('Aucune transaction ce mois-ci.',14,y); y+=8;
    } else {
      all.forEach(t=>{
        if(y>270){ doc.addPage(); y=20; }
        doc.text(formatDateFr(t.date),14,y);
        doc.text((t.desc||'—').slice(0,38),38,y);
        doc.text(t.nature,120,y);
        doc.text(t.type==='income'?'Revenu':'Dépense',150,y);
        doc.text((t.type==='income'?'+ ':'- ')+fmtMoney(t.montant,true),196,y,{align:'right'});
        y+=6;
      });
    }

    y+=4; doc.setDrawColor(200); doc.line(14,y,196,y); y+=8;

    const incomesOne = txForMonth(year,month,'income').reduce((s,t)=>s+Number(t.montant),0);
    const expensesOne = txForMonth(year,month,'expense').reduce((s,t)=>s+Number(t.montant),0);
    const occMonth = recurringOccurrencesForMonth(year,month);
    const incomesRec = occMonth.filter(o=>o.type==='income').reduce((s,o)=>s+o.amount,0);
    const expensesRec = occMonth.filter(o=>o.type==='expense').reduce((s,o)=>s+o.amount,0);
    const bal = balanceAu24(year,month);

    doc.setFont('helvetica','bold');
    doc.text('Revenus inopinés :', 14, y); doc.text('+ '+fmtMoney(incomesOne,true),196,y,{align:'right'}); y+=7;
    doc.text('Revenus récurrents :', 14, y); doc.text('+ '+fmtMoney(incomesRec,true),196,y,{align:'right'}); y+=7;
    doc.text('Dépenses inopinées :', 14, y); doc.text('- '+fmtMoney(expensesOne,true),196,y,{align:'right'}); y+=7;
    doc.text('Dépenses récurrentes :', 14, y); doc.text('- '+fmtMoney(expensesRec,true),196,y,{align:'right'}); y+=10;
    doc.setFontSize(13);
    doc.text('Solde au 24 '+monthName+' :', 14, y); doc.text(fmtMoney(bal,true),196,y,{align:'right'});

    doc.save('releve-budget-'+monthName.toLowerCase()+'-'+year+'.pdf');
    showToast('PDF téléchargé.');
  }catch(err){
    showToast('Impossible de générer le PDF.');
  }
}
