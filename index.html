<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Bouk's Budget</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F2F2F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bouk's Budget">
<meta name="mobile-web-app-capable" content="yes">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-text: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

    --bg:#F2F2F7;
    --card:#FFFFFF;
    --navy:#1C1C1E;
    --navy-2:#6E6E73;
    --ivory:#FFFFFF;
    --ivory-dim:#F2F2F7;
    --separator:rgba(60,60,67,0.16);
    --gold:#C9962E;
    --gold-light:#B07A1E;
    --green:#34C759;
    --rust:#FF3B30;
    --grey:#8E8E93;
    --line:rgba(60,60,67,0.13);
    --hero-from:#0A84FF;
    --hero-to:#5E5CE6;
    --balance-from:#0A84FF;
    --balance-to:#5E5CE6;
    --shadow-soft:0 1px 1px rgba(0,0,0,.03), 0 4px 10px -2px rgba(0,0,0,.07), 0 12px 24px -8px rgba(0,0,0,.08);
    --shadow-lift:0 2px 4px rgba(0,0,0,.06), 0 10px 20px -6px rgba(0,0,0,.12), 0 24px 40px -16px rgba(0,0,0,.14);
    --gloss-top:linear-gradient(180deg, rgba(255,255,255,.9) 0%, rgba(255,255,255,0) 55%);
  }
  .phone.dark{
    --bg:#000000;
    --card:#1C1C1E;
    --navy:#FFFFFF;
    --navy-2:#98989D;
    --separator:rgba(255,255,255,.14);
    --line:rgba(255,255,255,.12);
    --gloss-top:linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 55%);
  }
  .phone.dark .cal-cell.is-24{background:rgba(201,150,46,.18);}
  .phone.dark .occ-note{background:rgba(255,255,255,.08);}

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    font-family:var(--font-text);
    color:var(--navy);
    display:flex;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
    padding:0;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  input{font-family:inherit;}
  select{font-family:inherit;}
  .icon{width:18px;height:18px;display:inline-block;vertical-align:middle;}
  .icon svg{width:100%;height:100%;}

  /* Plein écran par défaut (mobile/PWA installée) */
  .phone{
    width:100vw;max-width:none;background:var(--bg);
    border-radius:0;overflow:hidden;box-shadow:none;
    height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  #app{display:flex;flex-direction:column;height:100%;min-height:0;}

  /* Aperçu "téléphone encadré", réservé aux grands écrans (navigateur desktop) */
  @media (min-width:700px){
    body{background:#000;padding:28px 12px;}
    .phone{
      width:100%;max-width:420px;
      border-radius:44px;
      box-shadow:0 30px 60px -20px rgba(0,0,0,.55), 0 0 0 8px #050505;
      height:840px;
      padding-top:0;padding-bottom:0;
    }
  }

  /* ---------- Header (iOS large-title style) ---------- */
  .header{
    background:var(--bg);color:var(--navy);
    padding:18px 16px 6px;display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .seal{
    width:36px;height:36px;border-radius:11px;flex-shrink:0;
    background:linear-gradient(160deg, var(--hero-from), var(--hero-to));
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
    box-shadow:0 3px 8px rgba(10,132,255,.4), inset 0 1px 1px rgba(255,255,255,.4);
  }
  .seal::before{content:"";position:absolute;inset:0;background:var(--gloss-top);opacity:.5;}
  .seal span{font-family:var(--font-display);font-weight:800;font-size:13px;color:#fff;position:relative;z-index:1;text-shadow:0 1px 2px rgba(0,0,0,.15);}
  .wordmark-group{display:flex;flex-direction:column;line-height:1;gap:2px;min-width:0;}
  .wordmark-kicker{font-size:9.5px;font-weight:700;letter-spacing:1.6px;color:var(--navy-2);}
  .wordmark{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:-.3px;color:var(--navy);white-space:nowrap;}
  .wordmark em{font-style:normal;background:linear-gradient(135deg, var(--hero-from), var(--hero-to));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .icon-btn{
    width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--navy);background:rgba(120,120,128,.12);
  }
  .icon-btn:hover{background:rgba(120,120,128,.2);}

  /* ---------- Year bar ---------- */
  .year-bar{
    background:var(--bg);color:var(--navy-2);
    display:flex;align-items:center;justify-content:center;gap:16px;
    padding:2px 0 10px;font-size:13px;letter-spacing:.2px;
  }
  .year-bar button{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--hero-from);border-radius:50%;}
  .year-bar button:hover{background:rgba(120,120,128,.12);}
  .year-bar .year-num{font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:0;color:var(--navy);}

  /* ---------- Month tabs ---------- */
  .month-tabs{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(72px, 1fr));
    background:var(--bg);
    padding:2px 12px 10px;gap:8px;
  }
  .month-tab{
    padding:10px 6px;text-align:center;
    border-radius:14px;background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    box-shadow:var(--shadow-soft);
  }
  .month-tab .m-name{font-size:11px;letter-spacing:.3px;color:var(--navy-2);font-weight:700;text-transform:uppercase;}
  .month-tab .m-amt{font-family:var(--font-mono);font-size:12px;font-weight:700;}
  .month-tab.active{
    background:linear-gradient(155deg, var(--hero-from) 0%, var(--hero-to) 65%, #4A3FD9 100%);
    box-shadow:var(--shadow-lift), 0 8px 18px -8px rgba(10,132,255,.5), inset 0 1px 1px rgba(255,255,255,.25);
  }
  .month-tab.active .m-name{color:rgba(255,255,255,.8);}
  .month-tab.active .m-amt{color:#fff !important;}
  .amt-pos{color:var(--green);}
  .amt-neg{color:var(--rust);}

  /* ---------- Archive (mois passés) ---------- */
  .archive-toggle-row{display:flex;justify-content:center;padding:0 12px 8px;}
  .archive-toggle{
    display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:12px;
    background:rgba(120,120,128,.12);color:var(--navy-2);font-size:12px;font-weight:600;letter-spacing:.1px;
  }
  .archive-toggle:hover{background:rgba(120,120,128,.2);}
  .archive-toggle .icon{width:13px;height:13px;}
  .archive-toggle .archive-count{
    background:rgba(120,120,128,.25);border-radius:8px;padding:1px 6px;font-size:11px;font-family:var(--font-mono);
  }
  .archive-toggle .archive-chev{width:11px;height:11px;transition:transform .2s ease;}
  .archive-toggle.open .archive-chev{transform:rotate(180deg);}
  .month-tabs-archive{padding-top:0;padding-bottom:6px;}
  .month-tab.is-past{opacity:.6;}
  .month-tab.is-past.active{opacity:1;}

  /* ---------- Bottom tab bar ---------- */
  .action-bar{
    display:flex;background:var(--card);border-top:1px solid var(--separator);
    padding:7px 4px env(safe-area-inset-bottom);gap:2px;flex-shrink:0;
    box-shadow:0 -2px 10px rgba(0,0,0,.05);
  }
  .action-tab{
    flex:1;padding:4px 2px;display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--navy-2);font-size:10.5px;font-weight:600;letter-spacing:.1px;border-radius:9px;
  }
  .action-tab.active{color:var(--navy);font-weight:800;}
  .action-tab .icon{width:13px;height:13px;color:#fff;}
  .tab-badge{
    width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 3px rgba(0,0,0,.2), inset 0 1px 1px rgba(255,255,255,.35);
    opacity:.55;transition:opacity .15s;
  }
  .action-tab.active .tab-badge{opacity:1;}

  /* ---------- Main ---------- */
  main{flex:1;overflow-y:auto;min-height:0;-webkit-overflow-scrolling:touch;padding:0 16px 16px;background:var(--bg);scroll-behavior:smooth;overscroll-behavior-y:contain;will-change:scroll-position;}

  .balance-card{
    background:linear-gradient(155deg, var(--balance-from) 0%, var(--balance-to) 65%, #4A3FD9 100%);
    color:#fff;border-radius:26px;padding:22px 20px 20px;margin-bottom:14px;
    position:sticky;top:0;z-index:5;overflow:hidden;
    box-shadow:var(--shadow-lift), 0 18px 34px -12px rgba(10,132,255,.5), inset 0 1px 1px rgba(255,255,255,.28);
  }
  .balance-card::before{
    content:"";position:absolute;top:-65%;right:-25%;width:260px;height:260px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.24), transparent 70%);
  }
  .balance-card::after{
    content:"";position:absolute;inset:0;
    background:var(--gloss-top), radial-gradient(circle at 85% 15%, rgba(255,255,255,.08), transparent 40%);
    opacity:.4;pointer-events:none;
  }
  .balance-card-orb{
    position:absolute;left:-18%;bottom:-45%;width:200px;height:200px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,180,84,.28), transparent 72%);pointer-events:none;
  }
  .label-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;position:relative;z-index:1;}
  .balance-card .label{
    font-size:11.5px;letter-spacing:.2px;color:rgba(255,255,255,.82);
    display:flex;align-items:center;gap:7px;min-width:0;font-weight:700;text-transform:uppercase;
  }
  .trend-badge{
    display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700;font-family:var(--font-mono);
    padding:5px 10px;border-radius:20px;flex-shrink:0;letter-spacing:.1px;
    background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.22);
  }
  .trend-badge .icon{width:11px;height:11px;}
  .trend-badge.up .icon{color:#7CFFB2;}
  .trend-badge.down .icon{color:#FFB0A0;}
  .mini-seal{
    width:22px;height:22px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(155deg, rgba(255,255,255,.32), rgba(255,255,255,.12));
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 1px 1px rgba(255,255,255,.4);
  }
  .mini-seal span{font-family:var(--font-display);font-size:9.5px;color:#fff;font-weight:800;}
  .balance-card .amount{font-family:var(--font-display);font-size:37px;font-weight:800;letter-spacing:-.6px;position:relative;z-index:1;text-shadow:0 2px 12px rgba(0,0,0,.12);}
  .hint{font-size:12px;color:var(--navy-2);margin:0 0 14px;line-height:1.5;}

  .amount-row{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap;position:relative;z-index:1;}
  .amount-today-wrap{display:flex;flex-direction:column;align-items:flex-end;padding-bottom:5px;}
  .amount-today-label{font-size:9.5px;letter-spacing:.2px;color:rgba(255,255,255,.75);margin-bottom:2px;white-space:nowrap;font-weight:600;}
  .amount-today{font-family:var(--font-mono);font-size:16px;font-weight:700;color:#FFB454;white-space:nowrap;}

  /* ---------- Daily budget card ---------- */
  .daily-card{background:var(--card);border-radius:18px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow-soft);}
  .daily-card--warn{box-shadow:var(--shadow-soft), 0 0 0 1.5px var(--rust) inset;}
  .daily-label{font-size:11px;letter-spacing:.2px;color:var(--navy-2);font-weight:700;margin-bottom:4px;}
  .daily-amount{font-family:var(--font-display);font-size:23px;font-weight:800;color:var(--navy);}
  .daily-card--warn .daily-amount{color:var(--rust);}
  .daily-unit{font-size:13px;font-family:var(--font-text);color:var(--navy-2);font-weight:500;}
  .daily-sub{font-size:12px;color:var(--navy-2);margin-top:4px;line-height:1.5;}

  /* ---------- Category tag ---------- */
  .cat-tag{font-size:11px;color:var(--navy-2);margin-top:2px;display:inline-flex;align-items:center;gap:5px;}
  .cat-badge{
    display:inline-flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;
    box-shadow:0 1px 2px rgba(0,0,0,.2), inset 0 1px 1px rgba(255,255,255,.35);
    color:#fff;line-height:1;
  }

  /* calendar */
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
  .weekdays div{text-align:center;font-size:11px;color:var(--navy-2);font-weight:600;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-cell{
    min-height:52px;border-radius:13px;background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    position:relative;padding:4px 1px;box-shadow:0 1px 2px rgba(0,0,0,.05);
  }
  .cal-cell.empty{background:transparent;box-shadow:none;}
  .cal-cell .d-num{font-family:var(--font-mono);font-size:10.5px;color:var(--navy-2);}
  .cal-cell .d-bal{font-family:var(--font-mono);font-size:10px;font-weight:700;line-height:1.2;white-space:nowrap;}
  .cal-cell.is-today{box-shadow:0 0 0 1.8px var(--hero-from) inset, 0 1px 2px rgba(0,0,0,.05);}
  .cal-cell.is-today .d-num{color:var(--hero-from);font-weight:700;}
  .cal-cell.is-24{box-shadow:0 0 0 2px var(--gold) inset, 0 1px 2px rgba(0,0,0,.05);background:linear-gradient(180deg,#FFFBF1,#FFF3DC);}
  .cal-dots{position:absolute;top:3px;right:3px;display:flex;gap:2px;}
  .dot{width:4px;height:4px;border-radius:50%;}
  .dot.income{background:var(--green);}
  .dot.expense{background:var(--rust);}
  .dot.ring{background:transparent;border:1.3px solid var(--green);}
  .dot.ring.expense{border-color:var(--rust);}

  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding-top:14px;}
  .section-head h2{font-family:var(--font-display);font-size:20px;margin:0;font-weight:800;letter-spacing:-.3px;color:var(--navy);}
  .section-head .total{font-family:var(--font-mono);font-size:14px;}

  .add-btn{
    width:100%;background:linear-gradient(180deg, #2B9BFF, var(--hero-from));color:#fff;border-radius:14px;
    padding:13px;font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px;
    margin-bottom:14px;position:relative;overflow:hidden;
    box-shadow:0 1px 1px rgba(255,255,255,.4) inset, 0 6px 14px -4px rgba(10,132,255,.5);
  }
  .add-btn::before{content:"";position:absolute;inset:0;background:var(--gloss-top);opacity:.3;}
  .add-btn:active{transform:scale(.98);opacity:.92;}

  .tx-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--separator);background:var(--card);}
  .tx-row:first-child{border-radius:14px 14px 0 0;}
  .tx-row:last-child{border-bottom:none;border-radius:0 0 14px 14px;}
  .tx-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .tx-icon.income{background:rgba(52,199,89,.14);color:var(--green);}
  .tx-icon.expense{background:rgba(255,59,48,.12);color:var(--rust);}
  .tx-mid{flex:1;min-width:0;}
  .tx-desc{font-size:14.5px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-date{font-size:11.5px;color:var(--navy-2);font-family:var(--font-mono);}
  .tx-amt{font-family:var(--font-mono);font-size:14px;font-weight:700;flex-shrink:0;}
  .icon-action{color:var(--navy-2);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icon-action:hover{background:rgba(120,120,128,.12);}
  .icon-action.danger:hover{color:var(--rust);background:rgba(255,59,48,.1);}
  .empty-state{text-align:center;color:var(--navy-2);font-size:13.5px;padding:34px 16px;line-height:1.6;background:var(--card);border-radius:18px;box-shadow:var(--shadow-soft);}

  .rec-row{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--separator);background:var(--card);}
  .rec-row:first-child{border-radius:14px 14px 0 0;}
  .rec-row:last-child{border-bottom:none;border-radius:0 0 14px 14px;}
  .rec-mid{flex:1;min-width:0;}
  .rec-libelle{font-size:14.5px;font-weight:600;color:var(--navy);}
  .rec-sub{font-size:11.5px;color:var(--navy-2);margin-top:3px;line-height:1.5;}
  .rec-sub b{font-family:var(--font-mono);font-weight:600;color:var(--navy);}
  .rec-amt{font-family:var(--font-mono);font-size:14px;font-weight:700;flex-shrink:0;white-space:nowrap;}
  .rec-actions{display:flex;gap:2px;flex-shrink:0;}
  .cred-bar-track{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:6px;box-shadow:inset 0 1px 2px rgba(0,0,0,.08);}
  .cred-bar-fill{height:100%;background:linear-gradient(90deg, #2BD46B, var(--green));border-radius:4px;}

  .pdf-card{background:var(--card);border-radius:18px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow-soft);}
  .pdf-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--separator);font-size:14px;color:var(--navy);}
  .pdf-row:last-child{border-bottom:none;font-weight:700;padding-top:12px;}
  .pdf-row .v{font-family:var(--font-mono);}
  .pdf-btn{
    width:100%;background:linear-gradient(180deg, #3A3A3C, var(--navy));color:#fff;border-radius:14px;padding:14px;
    font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:9px;
    position:relative;overflow:hidden;box-shadow:0 1px 1px rgba(255,255,255,.15) inset, var(--shadow-lift);
  }
  .pdf-btn::before{content:"";position:absolute;inset:0;background:var(--gloss-top);opacity:.18;}
  .pdf-btn:active{transform:scale(.98);}
  .pdf-month-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;padding-top:14px;}
  .pdf-month-nav button{width:30px;height:30px;border-radius:50%;background:var(--card);color:var(--hero-from);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-soft);}
  .pdf-month-nav .lbl{font-family:var(--font-display);font-size:16px;font-weight:800;min-width:140px;text-align:center;color:var(--navy);}

  /* ---------- Modal (iOS sheet) ---------- */
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;z-index:20;}
  .sheet{
    width:100%;background:var(--bg);border-radius:24px 24px 0 0;padding:10px 18px 24px;
    max-height:88%;overflow-y:auto;
    animation:slideUp .2s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -8px 40px rgba(0,0,0,.25);
  }
  @keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet::before{content:"";display:block;width:36px;height:5px;border-radius:3px;background:rgba(120,120,128,.3);margin:6px auto 12px;}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .sheet-head h3{font-family:var(--font-display);font-size:18px;margin:0;font-weight:800;color:var(--navy);}
  .sheet-close{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--navy-2);background:rgba(120,120,128,.12);}

  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11.5px;letter-spacing:.1px;color:var(--navy-2);font-weight:600;margin-bottom:5px;}
  .field input,.field select{width:100%;border:none;border-radius:12px;padding:11px 12px;font-size:15px;background:var(--card);color:var(--navy);box-shadow:var(--shadow-soft);}
  .type-toggle{display:flex;gap:8px;margin-bottom:13px;}

/* =================== CONSTANTS =================== */

/* =================== STATE =================== */
let settings = { soldeInitial:0, dateReference: todayISO(), darkMode:false, balanceColor:0 };
let recurring = [];     // {id,type,libelle,montant,frequence,jour,dateDebut,dateFin|null}
let overrides = [];     // {id,recurringId,defaultDate,montant|null,date|null,deleted|false}

let selectedYear = new Date().getFullYear();
let selectedMonth = new Date().getMonth();

let pdfMonth = new Date().getMonth();

let pinInput = '';
let lockError = false;

function todayISO(){ const d=new Date(); return fmtISO(d.getFullYear(),d.getMonth(),d.getDate()); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtISO(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
function uid(){ return 'id-'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function fmtMoney(v, decimals){
  if(v===null||v===undefined||isNaN(v)) v=0;
  return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:decimals?2:0,maximumFractionDigits:decimals?2:0}).format(v);
}
function fmtMoneyPdf(v, decimals){
  // jsPDF (police standard) ne gère pas l'espace fine insécable utilisée par Intl pour les milliers -> on la remplace par un espace normal
  return fmtMoney(v, decimals).replace(/[\u202F\u00A0]/g, ' ');
}
function clampDay(y,m,day){ const last=new Date(y,m+1,0).getDate(); return Math.min(day,last); }
function monthKeyOf(y,m){ return y+'-'+pad(m+1); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function formatDateFr(iso){ const [y,m,d]=iso.split('-'); return d+' '+MONTHS_ABBR[parseInt(m,10)-1]; }
function formatDateFull(iso){ const [y,m,d]=iso.split('-').map(Number); return d+' '+MONTHS_FULL[m-1]+' '+y; }

/* =================== STORAGE =================== */
async function loadData(){
  try{
    const raw = localStorage.getItem('budget24-data');
    if(raw){
      const parsed = JSON.parse(raw);
      settings = Object.assign(settings, parsed.settings||{});
      recurring = parsed.recurring || [];
      overrides = parsed.overrides || [];
      transactions = parsed.transactions || [];
    } else {
      modal = {kind:'settings', first:true};
    }
  }catch(e){
    modal = {kind:'settings', first:true};
  }
  migrateOldSalary();
  applyShortcutParams();
  loaded = true;
  render();
}
function applyShortcutParams(){
  try{
    const params = new URLSearchParams(window.location.search);
    const action = params.get('action');
    if(action==='add-expense' || action==='add-income'){
      modal = {kind:'day', date:todayISO(), formOpen:true, editingTxId:null};
      modalTypeState = action==='add-income' ? 'income' : 'expense';
      activeView = 'calendar';
    } else if(action==='view-expenses'){
      activeView = 'expenses';
    } else if(action==='view-incomes'){
      activeView = 'incomes';
    }
    if(action){
      const url = new URL(window.location.href);
      url.searchParams.delete('action');
      window.history.replaceState({}, '', url.pathname + (url.search || '') + url.hash);
    }
  }catch(e){ /* ignore malformed URL */ }
}
function migrateOldSalary(){
  if(settings.salaire && Number(settings.salaire)>0){
    recurring.push({id:uid(), type:'income', libelle:'Salaire', montant:Number(settings.salaire), frequence:'monthly', jour:Number(settings.jourSalaire)||25, dateDebut:settings.dateReference, dateFin:null});
    delete settings.salaire; delete settings.jourSalaire;
    persist();
  }
}
async function persist(){
  try{
    localStorage.setItem('budget24-data', JSON.stringify({settings, recurring, overrides, transactions}));
  }catch(e){
    showToast('Erreur de sauvegarde, réessayez.');
  }
}
function showToast(msg){
  toastMsg = msg;
  render();
  setTimeout(()=>{ toastMsg=null; render(); }, 2200);
}

/* =================== RECURRING / BALANCE LOGIC =================== */
const WEEKDAYS_FULL = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
function getOverrideFor(recurringId, defaultDate){
  return overrides.find(o=>o.recurringId===recurringId && o.defaultDate===defaultDate) || null;
}
function getPalierMontant(r, occDate){
  if(!r.paliers || r.paliers.length===0) return Number(r.montant);
  let applicable = null;
  r.paliers.forEach(p=>{
    const pd = new Date(p.dateDebut+'T00:00:00');
    if(pd <= occDate && (!applicable || pd > new Date(applicable.dateDebut+'T00:00:00'))) applicable = p;
  });
  return applicable ? Number(applicable.montant) : Number(r.montant);
}
function pushOccurrence(out, r, defaultDateStr){
  const ov = getOverrideFor(r.id, defaultDateStr);
  if(ov && ov.deleted) return;
  const occDate = new Date(defaultDateStr+'T00:00:00');
  const baseAmount = (r.creancier && r.paliers && r.paliers.length) ? getPalierMontant(r, occDate) : Number(r.montant);
  out.push({
    date: ov && ov.date ? ov.date : defaultDateStr,
    amount: ov && ov.montant!=null ? Number(ov.montant) : baseAmount,
    type: r.type,
    recurringId: r.id,
    libelle: r.libelle,
    defaultDate: defaultDateStr,
    overridden: !!ov
  });
}
function getRecurringOccurrences(maxYear){
  const out = [];
  recurring.forEach(r=>{
    const freq = r.frequence || 'monthly';
    const start = new Date(r.dateDebut+'T00:00:00');
    const end = r.dateFin ? new Date(r.dateFin+'T00:00:00') : null;
    const limit = new Date(maxYear+1,0,1);
    let guard=0;

    if(freq==='weekly' || freq==='biweekly'){
      const stepDays = freq==='weekly' ? 7 : 14;
      const targetDow = Number(r.jour); // 0=Lundi ... 6=Dimanche
      let cur = new Date(start);
      while(((cur.getDay()+6)%7) !== targetDow){ cur.setDate(cur.getDate()+1); guard++; if(guard>14) break; }
      guard=0;
      while(cur < limit){
        guard++; if(guard>6000) break;
        if(end && cur > end) break;
        pushOccurrence(out, r, fmtISO(cur.getFullYear(),cur.getMonth(),cur.getDate()));
        cur.setDate(cur.getDate()+stepDays);
      }
    } else {
      const monthStep = freq==='quarterly' ? 3 : (freq==='yearly' ? 12 : 1);
      let y = start.getFullYear(), m = start.getMonth();
      while(true){
        guard++; if(guard>3000) break;
        const day = clampDay(y,m,r.jour);
        const occDate = new Date(y,m,day);
        if(occDate >= limit) break;
        if(end && occDate > end) break;
        if(occDate >= start){
          pushOccurrence(out, r, fmtISO(y,m,day));
        }
        m += monthStep; while(m>11){ m-=12; y++; }
      }
    }
  });
  return out;
}
function getAllEvents(maxYear){
  const txEvents = transactions.map(t=>({date:t.date, amount: t.type==='income'? Number(t.montant) : -Number(t.montant)}));
  const recEvents = getRecurringOccurrences(maxYear).map(o=>({date:o.date, amount: o.type==='income'? o.amount : -o.amount}));
  return txEvents.concat(recEvents);
}
function computeBalanceAt(uptoISO){
  const upToDate = new Date(uptoISO+'T00:00:00');
  const refDate = new Date(settings.dateReference+'T00:00:00');
  const maxYear = Math.max(upToDate.getFullYear(), refDate.getFullYear());
  const events = getAllEvents(maxYear);
  let sum=0;
  if(upToDate >= refDate){
    events.forEach(e=>{ const ed=new Date(e.date+'T00:00:00'); if(ed>refDate && ed<=upToDate) sum+=e.amount; });
    return Number(settings.soldeInitial) + sum;
  } else {
    events.forEach(e=>{ const ed=new Date(e.date+'T00:00:00'); if(ed>upToDate && ed<=refDate) sum+=e.amount; });
    return Number(settings.soldeInitial) - sum;
  }
}
function balanceAu24(year,month){ return computeBalanceAt(fmtISO(year,month,24)); }
function getMonthlyDailyBalances(year,month){
  const daysInMonth = new Date(year,month+1,0).getDate();
  const prevDay = new Date(year,month,0);
  const prevIso = fmtISO(prevDay.getFullYear(), prevDay.getMonth(), prevDay.getDate());
  let running = computeBalanceAt(prevIso);
  const maxYear = Math.max(year, new Date(settings.dateReference+'T00:00:00').getFullYear());
  const events = getAllEvents(maxYear);
  const map = {};
  for(let d=1; d<=daysInMonth; d++){
    const iso = fmtISO(year,month,d);
    const dayNet = events.filter(e=>e.date===iso).reduce((s,e)=>s+e.amount,0);
    running += dayNet;
    map[iso] = running;
  }
  return map;
}
function fmtMoneyTiny(v){
  const sign = v<0 ? '-' : '';
  const abs = Math.abs(Math.round(v));
  return sign + new Intl.NumberFormat('fr-FR').format(abs);
}

function txForDay(iso){ return transactions.filter(t=>t.date===iso); }
function recurringOccurrencesForDay(iso){
  const y = parseInt(iso.slice(0,4),10);
  return getRecurringOccurrences(y).filter(o=>o.date===iso);
}
function recurringOccurrencesForMonth(year,month){
  const prefix = monthKeyOf(year,month);
  return getRecurringOccurrences(year).filter(o=>o.date.startsWith(prefix));
}
function txForMonth(year,month,type){
  const prefix = monthKeyOf(year,month);
  return transactions.filter(t=>t.date.startsWith(prefix) && (!type || t.type===type)).sort((a,b)=>a.date.localeCompare(b.date));
}
function recurringByType(type, creancierOnly){
  return recurring.filter(r=>r.type===type && !!r.creancier===!!creancierOnly).slice().sort((a,b)=>a.libelle.localeCompare(b.libelle));
}
function creancierProgress(r){
  const total = Number(r.montantDu)||0;
  const todayIso = todayISO();
  const paidOccs = getRecurringOccurrences(new Date().getFullYear()+2).filter(o=>o.recurringId===r.id && o.date<=todayIso);
  const paid = paidOccs.reduce((s,o)=>s+o.amount,0);
  const remaining = Math.max(0, total-paid);
  const pct = total>0 ? Math.min(100, Math.round((paid/total)*100)) : 0;
  return {paid, remaining, total, pct};
}
function freqLabel(r){
  const freq = r.frequence || 'monthly';
  if(freq==='weekly') return 'Tous les '+WEEKDAYS_FULL[r.jour].toLowerCase()+'s';
  if(freq==='biweekly') return 'Un '+WEEKDAYS_FULL[r.jour].toLowerCase()+' sur deux';
  if(freq==='quarterly') return 'Le '+r.jour+' de chaque mois, tous les 3 mois';
  if(freq==='yearly'){
    const mIdx = new Date(r.dateDebut+'T00:00:00').getMonth();
    return 'Le '+r.jour+' '+MONTHS_FULL[mIdx].toLowerCase()+', chaque année';
  }
  return 'Le '+r.jour+' de chaque mois';
}
function getDailyBudgetInfo(){
  const now = new Date();
  const todayY=now.getFullYear(), todayM=now.getMonth(), todayD=now.getDate();
  let checkY=todayY, checkM=todayM;
  if(todayD>24){ checkM++; if(checkM>11){checkM=0;checkY++;} }
  const checkpointISO = fmtISO(checkY,checkM,24);
  const todayIso = todayISO();
  const balanceToday = computeBalanceAt(todayIso);
  const checkpointDate = new Date(checkpointISO+'T00:00:00');
  const today0 = new Date(todayIso+'T00:00:00');
  const daysRemaining = Math.round((checkpointDate-today0)/86400000)+1;
  const perDay = daysRemaining>0 ? balanceToday/daysRemaining : null;
  return {balanceToday, daysRemaining, perDay, checkpointISO};
}
function renderDailyBudgetCard(){
  const info = getDailyBudgetInfo();
  if(info.balanceToday < 0){
    return `<div class="daily-card daily-card--warn">
      <div class="daily-label">⚠️ Solde actuel</div>
      <div class="daily-amount">${fmtMoney(info.balanceToday,true)}</div>
      <div class="daily-sub">Vous êtes déjà dans le négatif avant le ${formatDateFull(info.checkpointISO)}.</div>
    </div>`;
  }
  return `<div class="daily-card">
    <div class="daily-label">Budget du jour</div>
    <div class="daily-amount">${fmtMoney(info.perDay,true)} <span class="daily-unit">/ jour</span></div>
    <div class="daily-sub">${fmtMoney(info.balanceToday,true)} restant sur ${info.daysRemaining} jour${info.daysRemaining>1?'s':''}, jusqu'au ${formatDateFull(info.checkpointISO)}</div>
  </div>`;
}
function categoryBreakdownForMonth(year,month){
  const map = {};
  txForMonth(year,month,'expense').forEach(t=>{
    const c = t.categorie || 'Autre';
    map[c] = (map[c]||0) + Number(t.montant);
  });
  recurringOccurrencesForMonth(year,month).filter(o=>o.type==='expense').forEach(o=>{
    const r = recurring.find(x=>x.id===o.recurringId);
    const c = (r && r.categorie) || 'Autre';
    map[c] = (map[c]||0) + o.amount;
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

function render(){
  const app = document.getElementById('app');
  if(!loaded){ app.innerHTML = '<div style="padding:60px 20px;text-align:center;color:#8A8D98;font-family:Inter,sans-serif;">Chargement…</div>'; return; }

  applyPhoneStyle();

  if(settings.pinCode && !pinUnlocked){
    app.innerHTML = renderLockScreen();
    return;
  }

  const prevMain = app.querySelector('main');
  const prevScroll = prevMain ? prevMain.scrollTop : 0;

  app.innerHTML = `
    ${renderHeader()}
    ${renderYearBar()}
    ${renderMonthTabs()}
    <main>${renderMain()}</main>
    ${renderActionBar()}
    ${modal ? renderModal() : ''}
    ${toastMsg ? '<div class="toast">'+toastMsg+'</div>' : ''}
  `;
  const newMain = app.querySelector('main');
  if(newMain) newMain.scrollTop = resetScrollNext ? 0 : prevScroll;
  resetScrollNext = false;
  applyModalUIState();
}
function applyPhoneStyle(){
  const phoneEl = document.getElementById('phone');
  if(!phoneEl) return;
  phoneEl.classList.toggle('dark', !!settings.darkMode);
  const pal = BALANCE_PALETTE[settings.balanceColor] || BALANCE_PALETTE[0];
  phoneEl.style.setProperty('--balance-from', pal.c1);
  phoneEl.style.setProperty('--balance-to', pal.c2);
}
function renderLockScreen(){
  let dots = '';
  for(let i=0;i<4;i++){
    let cls = 'lock-dot';
    if(lockError) cls += ' error';
    else if(pinInput.length>i) cls += ' filled';
    dots += '<span class="'+cls+'"></span>';
  }
  const keys = [1,2,3,4,5,6,7,8,9];
  let keypad = keys.map(n=>'<button class="lock-key" data-action="pin-digit" data-digit="'+n+'">'+n+'</button>').join('');
  keypad += '<div></div><button class="lock-key" data-action="pin-digit" data-digit="0">0</button><button class="lock-key" data-action="pin-backspace">⌫</button>';
  return `<div class="lock-screen">
    <div class="lock-seal"><span>24</span></div>
    <div class="lock-title">Budget<em>24</em></div>
    <div class="lock-sub">Entrez votre code</div>
    <div class="lock-dots">${dots}</div>
    <div class="lock-keypad">${keypad}</div>
    ${lockError?'<div class="lock-error-msg">Code incorrect</div>':''}
  </div>`;
}
function checkPin(){
  if(pinInput === settings.pinCode){
    pinUnlocked = true; pinInput=''; lockError=false; render();
  } else {
    lockError = true; render();
    setTimeout(()=>{ pinInput=''; lockError=false; render(); }, 600);
  }
}
function applyModalUIState(){
  if(!modal) return;
  if(modal.kind==='day' && (modal.formOpen || modal.editingTxId)){
    document.querySelectorAll('.type-pill').forEach(p=>p.classList.toggle('active', p.dataset.type===modalTypeState));
  }
  if(modal.kind==='recurring'){
    const pill = document.getElementById('noend-pill');
    const wrap = document.getElementById('fin-field');
    if(pill) pill.classList.toggle('active', modalNoEnd);
    if(wrap) wrap.style.display = modalNoEnd ? 'none' : 'block';
  }
}

function renderCalendar(){
  const bal = balanceAu24(selectedYear,selectedMonth);
  let prevMonth = selectedMonth-1, prevYear = selectedYear;
  if(prevMonth<0){ prevMonth=11; prevYear--; }
  const prevBal = balanceAu24(prevYear,prevMonth);
  const delta = bal - prevBal;
  const deltaUp = delta>=0;
  const todayIso = todayISO();
  const todayBalance = computeBalanceAt(todayIso);
  const now = new Date();
  const isCurrentMonth = (selectedYear===now.getFullYear() && selectedMonth===now.getMonth());
  const firstDow = (new Date(selectedYear,selectedMonth,1).getDay()+6)%7;
  const daysInMonth = new Date(selectedYear,selectedMonth+1,0).getDate();
  const dailyBalances = getMonthlyDailyBalances(selectedYear,selectedMonth);

  let html = `
  <div class="balance-card">
    <div class="balance-card-orb"></div>
    <div class="label-row">
      <div class="label"><span class="mini-seal"><span>24</span></span> Solde au 24 ${MONTHS_FULL[selectedMonth]}</div>
      <div class="trend-badge ${deltaUp?'up':'down'}">${icon(deltaUp?'up':'down')}${fmtMoney(Math.abs(delta),false)}</div>
    </div>
    <div class="amount-row">
      <div class="amount" style="color:${bal>=0?'#fff':'#FFB0A0'}">${fmtMoney(bal,true)}</div>
      ${isCurrentMonth ? `<div class="amount-today-wrap"><span class="amount-today-label">Solde du jour</span><span class="amount-today">${fmtMoney(todayBalance,true)}</span></div>` : ''}
    </div>
  </div>`;
  if(isCurrentMonth) html += renderDailyBudgetCard();

  html += '<div class="weekdays">'+WEEKDAYS.map(w=>'<div>'+w+'</div>').join('')+'</div>';
  html += '<div class="cal-grid">';
  for(let i=0;i<firstDow;i++) html += '<div class="cal-cell empty"></div>';
  for(let d=1; d<=daysInMonth; d++){
    const iso = fmtISO(selectedYear,selectedMonth,d);
    const dayTx = txForDay(iso);
    const dayRec = recurringOccurrencesForDay(iso);
    const hasIncomeOne = dayTx.some(t=>t.type==='income');
    const hasExpenseOne = dayTx.some(t=>t.type==='expense');
    const hasIncomeRec = dayRec.some(o=>o.type==='income');
    const hasExpenseRec = dayRec.some(o=>o.type==='expense');
    let classes = 'cal-cell';
    if(iso===todayIso) classes += ' is-today';
    if(d===24) classes += ' is-24';
    let dots = '';
    if(hasIncomeOne) dots += '<span class="dot income"></span>';
    else if(hasIncomeRec) dots += '<span class="dot ring"></span>';
    if(hasExpenseOne) dots += '<span class="dot expense"></span>';
    else if(hasExpenseRec) dots += '<span class="dot ring expense"></span>';
    const dayBal = dailyBalances[iso];
    const balCls = dayBal>=0 ? 'amt-pos' : 'amt-neg';
    html += `<button class="${classes}" data-action="open-day" data-date="${iso}">
      <span class="cal-dots">${dots}</span>
      <span class="d-num">${d}</span>
      <span class="d-bal ${balCls}">${fmtMoneyTiny(dayBal)}</span>
    </button>`;
  }
  html += '</div>';
  return html;
}

function renderCategoryBreakdownCard(year,month){
  const rows = categoryBreakdownForMonth(year,month);
  if(rows.length===0) return '';
  let html = '<div class="pdf-card"><div class="section-head" style="margin-bottom:8px;"><h2 style="font-size:15px;">Répartition des dépenses</h2></div>';
  rows.forEach(([cat,total])=>{
    html += `<div class="pdf-row"><span style="display:flex;align-items:center;gap:8px;">${catBadge(cat,22)} ${cat}</span><span class="v amt-neg">${fmtMoney(total,true)}</span></div>`;
  });
  html += '</div>';
  return html;
}

function changeMonth(delta){
  let m = selectedMonth + delta;
  let y = selectedYear;
  if(m<0){ m=11; y--; }
  if(m>11){ m=0; y++; }
  let guard=0;
  while(y===2026 && m<5 && guard<24){
    guard++;
    m += (delta>=0?1:-1);
    if(m<0){ m=11; y--; }
    if(m>11){ m=0; y++; }
  }
  selectedYear = y; selectedMonth = m; activeView='calendar';
  resetScrollNext = true;
  render();
}
let touchStartX = null, touchStartY = null;
document.addEventListener('touchstart', (e)=>{
  if(modal || activeView!=='calendar' || selectedMonth==null) return;
  if(e.target.closest('.month-tabs')) return;
  if(e.touches.length===1){ touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }
}, {passive:true});
document.addEventListener('touchend', (e)=>{
  if(touchStartX===null) return;
  const touch = e.changedTouches[0];
  const dx = touch.clientX - touchStartX;
  const dy = touch.clientY - touchStartY;
  touchStartX = null; touchStartY = null;
  if(Math.abs(dx) > 60 && Math.abs(dy) < 60){
    changeMonth(dx < 0 ? 1 : -1);
  }
}, {passive:true});
document.addEventListener('change', (e)=>{
  if(e.target.id==='rec-freq'){
    const isWeekly = (e.target.value==='weekly' || e.target.value==='biweekly');
    const wf = document.getElementById('freq-weekday-field');
    const mf = document.getElementById('freq-monthday-field');
    if(wf) wf.style.display = isWeekly ? 'block' : 'none';
    if(mf) mf.style.display = isWeekly ? 'none' : 'block';
  }
});
document.addEventListener('click', async (e)=>{
  if(e.target.classList && e.target.classList.contains('overlay')){ modal=null; render(); return; }
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;

  if(action==='pin-digit'){
    if(pinInput.length<4){ pinInput += btn.dataset.digit; lockError=false; render(); if(pinInput.length===4) checkPin(); }
    return;
  }
  if(action==='pin-backspace'){ pinInput = pinInput.slice(0,-1); render(); return; }

  if(action==='select-month'){ selectedMonth = parseInt(btn.dataset.month,10); activeView='calendar'; resetScrollNext=true; render(); return; }
  if(action==='toggle-past-months'){ showPastMonths = !showPastMonths; render(); return; }
  if(action==='select-view'){
    activeView = btn.dataset.view;
    if(activeView==='pdf' && selectedMonth!=null){ pdfYear=selectedYear; pdfMonth=selectedMonth; }
    resetScrollNext=true; render(); return;
  }
  if(action==='year-prev'){ selectedYear--; resetScrollNext=true; render(); return; }
  if(action==='year-next'){ selectedYear++; resetScrollNext=true; render(); return; }
  if(action==='pdf-prev'){ pdfMonth--; if(pdfMonth<0){pdfMonth=11;pdfYear--;} resetScrollNext=true; render(); return; }
  if(action==='pdf-next'){ pdfMonth++; if(pdfMonth>11){pdfMonth=0;pdfYear++;} resetScrollNext=true; render(); return; }

  if(action==='open-settings'){ modal={kind:'settings'}; render(); return; }
  if(action==='toggle-dark'){ settings.darkMode = !settings.darkMode; persist(); render(); return; }
  if(action==='set-balance-color'){
    settings.balanceColor = parseInt(btn.dataset.index,10);
    applyPhoneStyle();
    document.querySelectorAll('.theme-swatch').forEach((s,i)=>s.classList.toggle('active', i===settings.balanceColor));
    persist();
    return;
  }
  if(action==='close-modal'){ modal=null; render(); return; }

  /* ---- day modal ---- */
  if(action==='open-day'){ modal = {kind:'day', date:btn.dataset.date, formOpen:false, editingTxId:null}; modalTypeState='expense'; render(); return; }
  if(action==='show-day-form'){ modal.formOpen=true; modal.editingTxId=null; modalTypeState='expense'; render(); return; }
  if(action==='cancel-day-form'){ modal.formOpen=false; modal.editingTxId=null; render(); return; }
  if(action==='edit-day-tx'){
    const t = transactions.find(x=>x.id===btn.dataset.id);
    if(!t) return;
    modal.editingTxId = t.id; modal.formOpen=false; modalTypeState=t.type; render(); return;
  }
  if(action==='toggle-type'){
    modalTypeState = btn.dataset.type;
    document.querySelectorAll('.type-pill').forEach(p=>p.classList.toggle('active', p.dataset.type===modalTypeState));
    const catField = document.getElementById('tx-cat-field');
    if(catField) catField.style.display = modalTypeState==='expense' ? 'block' : 'none';
    return;
  }
  if(action==='save-day-tx'){
    const montant = parseFloat(document.getElementById('tx-amount').value);
    if(!montant || montant<=0){ showToast('Indiquez un montant valide.'); return; }
    const date = document.getElementById('tx-date').value || modal.date;
    const description = document.getElementById('tx-desc').value.trim();
    const catEl = document.getElementById('tx-categorie');
    const categorie = (modalTypeState==='expense' && catEl) ? catEl.value : null;
    if(modal.editingTxId){
      const t = transactions.find(x=>x.id===modal.editingTxId);
      t.montant=montant; t.description=description; t.date=date; t.type=modalTypeState; t.categorie=categorie;
    } else {
      transactions.push({id:uid(), date, type:modalTypeState, montant, description, categorie});
    }
    await persist();
    modal.formOpen=false; modal.editingTxId=null;
    render();
    showToast('Enregistré.');
    return;
  }
  if(action==='delete-tx'){
    transactions = transactions.filter(t=>t.id!==btn.dataset.id);
    await persist();
    if(modal && modal.kind==='day'){ modal.formOpen=false; modal.editingTxId=null; } else { modal=null; }
    render();
    showToast('Supprimé.');
    return;
  }

  /* ---- recurring CRUD ---- */
  if(action==='add-recurring'){
    const isCreancier = btn.dataset.creancier==='1';
    modal={kind:'recurring', type:btn.dataset.type, creancier:isCreancier, draft:null};
    modalNoEnd = !isCreancier;
    render(); return;
  }
  if(action==='edit-recurring'){
    const r = recurring.find(x=>x.id===btn.dataset.id);
    if(!r) return;
    modal = {kind:'recurring', type:r.type, editId:r.id, creancier:!!r.creancier, draft:null}; modalNoEnd = !r.dateFin; render(); return;
  }
  if(action==='toggle-noend'){
    modalNoEnd = !modalNoEnd;
    const pill = document.getElementById('noend-pill');
    const wrap = document.getElementById('fin-field');
    if(pill) pill.classList.toggle('active', modalNoEnd);
    if(wrap) wrap.style.display = modalNoEnd ? 'none' : 'block';
    return;
  }
  if(action==='add-palier' || action==='remove-palier'){
    const dft = readCreancierDraftFromDOM();
    if(action==='remove-palier'){
      const idx = parseInt(btn.dataset.index,10);
      dft.paliers.splice(idx,1);
      if(dft.paliers.length===0) dft.paliers.push({montant:'', dateDebut:todayISO()});
    } else {
      dft.paliers.push({montant:'', dateDebut:todayISO()});
    }
    modal.draft = dft;
    render();
    return;
  }
  if(action==='save-recurring'){
    const isCreancier = !!modal.creancier;
    const libelle = document.getElementById('rec-libelle').value.trim();
    const montantDu = isCreancier ? (parseFloat(document.getElementById('rec-montant-du').value)||0) : null;
    const frequence = isCreancier ? 'monthly' : document.getElementById('rec-freq').value;
    const isWeekly = (frequence==='weekly' || frequence==='biweekly');
    const jour = isWeekly
      ? parseInt(document.getElementById('rec-jour-semaine').value,10)
      : Math.min(31, Math.max(1, parseInt(document.getElementById('rec-jour').value,10)||1));
    const catEl = document.getElementById('rec-categorie');
    const categorie = isCreancier ? 'Dettes' : ((modal.type==='expense' && catEl) ? catEl.value : null);
    const dateDebut = document.getElementById('rec-debut').value || todayISO();
    const dateFinVal = document.getElementById('rec-fin').value;
    const dateFin = modalNoEnd ? null : (dateFinVal || null);
    if(!libelle){ showToast(isCreancier?'Indiquez le nom du créancier.':'Indiquez un libellé.'); return; }
    if(dateFin && dateFin<dateDebut){ showToast('La date de fin doit être après le début.'); return; }

    let montant, paliers=null;
    if(isCreancier){
      const dft = readCreancierDraftFromDOM();
      for(const p of dft.paliers){
        if(!p.montant || Number(p.montant)<=0 || !p.dateDebut){ showToast('Renseignez un montant et une date pour chaque palier.'); return; }
      }
      paliers = dft.paliers.map(p=>({montant:Number(p.montant), dateDebut:p.dateDebut})).sort((a,b)=>a.dateDebut.localeCompare(b.dateDebut));
      montant = paliers[paliers.length-1].montant;
    } else {
      montant = parseFloat(document.getElementById('rec-montant').value);
      if(!montant || montant<=0){ showToast('Indiquez un montant valide.'); return; }
    }

    if(modal.editId){
      const r = recurring.find(x=>x.id===modal.editId);
      Object.assign(r, {libelle, montant, montantDu, frequence, jour, categorie, dateDebut, dateFin, creancier:isCreancier, paliers});
    } else {
      recurring.push({id:uid(), type:modal.type, libelle, montant, montantDu, frequence, jour, categorie, dateDebut, dateFin, creancier:isCreancier, paliers});
    }
    await persist();
    modal=null; render();
    showToast('Enregistré.');
    return;
  }
  if(action==='delete-recurring'){
    const id = btn.dataset.id;
    recurring = recurring.filter(r=>r.id!==id);
    overrides = overrides.filter(o=>o.recurringId!==id);
    await persist();
    modal=null; render();
    showToast('Supprimé.');
    return;
  }

  /* ---- single-occurrence adjustments ---- */
  if(action==='adjust-occurrence'){
    const dayDate = modal.date;
    modal = {kind:'occurrence', recurringId:btn.dataset.recurringId, defaultDate:btn.dataset.defaultDate, dayDate};
    render(); return;
  }
  if(action==='back-to-day'){ modal = {kind:'day', date:modal.dayDate, formOpen:false, editingTxId:null}; render(); return; }
  if(action==='save-occurrence'){
    const montant = parseFloat(document.getElementById('occ-amount').value);
    const date = document.getElementById('occ-date').value;
    if(!montant || montant<=0){ showToast('Indiquez un montant valide.'); return; }
    let ov = getOverrideFor(modal.recurringId, modal.defaultDate);
    if(!ov){ ov = {id:uid(), recurringId:modal.recurringId, defaultDate:modal.defaultDate}; overrides.push(ov); }
    ov.montant = montant; ov.date = date; ov.deleted=false;
    await persist();
    const dayDate = modal.dayDate;
    modal = {kind:'day', date:dayDate, formOpen:false, editingTxId:null};
    render();
    showToast('Échéance ajustée.');
    return;
  }
  if(action==='reset-occurrence'){
    overrides = overrides.filter(o=>!(o.recurringId===modal.recurringId && o.defaultDate===modal.defaultDate));
    await persist();
    const dayDate = modal.dayDate;
    modal = {kind:'day', date:dayDate, formOpen:false, editingTxId:null};
    render();
    showToast('Échéance réinitialisée.');
    return;
  }
  if(action==='skip-occurrence'){
    let ov = getOverrideFor(modal.recurringId, modal.defaultDate);
    if(!ov){ ov = {id:uid(), recurringId:modal.recurringId, defaultDate:modal.defaultDate}; overrides.push(ov); }
    ov.deleted = true;
    await persist();
    const dayDate = modal.dayDate;
    modal = {kind:'day', date:dayDate, formOpen:false, editingTxId:null};
    render();
    showToast('Échéance ignorée.');
    return;
  }

  if(action==='save-settings'){
    const solde = parseFloat(document.getElementById('set-solde').value)||0;
    const date = document.getElementById('set-date').value || todayISO();
    settings = {soldeInitial:solde, dateReference:date, pinCode: settings.pinCode||null, darkMode: !!settings.darkMode, balanceColor: settings.balanceColor||0};
    await persist();
    modal=null; render();
    showToast('Réglages enregistrés.');
    return;
  }
  if(action==='open-pin-setup'){ modal={kind:'pin-setup'}; render(); return; }
  if(action==='save-pin'){
    const p1 = document.getElementById('pin-new').value;
    const p2 = document.getElementById('pin-confirm').value;
    if(!/^\d{4}$/.test(p1)){ showToast('Le code doit comporter 4 chiffres.'); return; }
    if(p1!==p2){ showToast('Les deux codes ne correspondent pas.'); return; }
    settings.pinCode = p1;
    await persist();
    modal=null; render();
    showToast('Code PIN activé.');
    return;
  }
  if(action==='remove-pin'){
    settings.pinCode = null;
    await persist();
    modal=null; render();
    showToast('Verrouillage supprimé.');
    return;
  }

  if(action==='generate-pdf'){ generatePdf(pdfYear, pdfMonth); return; }
});

    const expensesOne = txForMonth(year,month,'expense').reduce((s,t)=>s+Number(t.montant),0);
    const occMonth = recurringOccurrencesForMonth(year,month);
    const incomesRec = occMonth.filter(o=>o.type==='income').reduce((s,o)=>s+o.amount,0);
    const expensesRec = occMonth.filter(o=>o.type==='expense').reduce((s,o)=>s+o.amount,0);
    const bal = balanceAu24(year,month);
    const totalIncomes = incomesOne+incomesRec;
    const totalExpenses = expensesOne+expensesRec;

    doc.setFillColor(247,247,250);
    doc.roundedRect(14, y, 182, 32, 3, 3, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(110,110,115);

    doc.text('DEPENSES DU MOIS', 84, y+10);
    doc.text('SOLDE AU 24', 144, y+10);
    doc.setFont('helvetica','bold'); doc.setFontSize(14);

    doc.setTextColor(255,59,48); doc.text(fmtMoneyPdf(totalExpenses,true), 84, y+21);

    doc.text(fmtMoneyPdf(bal,true), 144, y+21);

    const recs = recurringOccurrencesForMonth(year,month).map(o=>({date:o.date, desc:o.libelle, type:o.type, montant:o.amount, nature:'Récurrent'}));
    const all = ones.concat(recs).sort((a,b)=>a.date.localeCompare(b.date));

    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(28,28,30);
    doc.text('Détail des transactions', 14, y); y += 8;

      doc.rect(14, y-5, 182, 7, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(255,255,255);

    doc.setFont('helvetica','normal'); doc.setFontSize(9.5);

      doc.setTextColor(140,140,145);
      doc.text('Aucune transaction ce mois-ci.',17,y); y+=8;

        doc.setTextColor(60,60,65);
        doc.text(formatDateFr(t.date),17,y);
        doc.text((t.desc||'—').slice(0,34),40,y);
        doc.text(t.nature,122,y);
        doc.text(t.type==='income'?'Revenu':'Dépense',150,y);
        if(t.type==='income'){ doc.setTextColor(36,138,61); } else { doc.setTextColor(199,42,35); }
